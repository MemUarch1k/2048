<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memuar's 2048</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2f3f 0%, #0e1a26 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: min(550px, 100%);
        }
        h1 {
            text-align: center;
            color: white;
            font-weight: 600;
            font-size: 2rem;
            margin: 0 0 4px;
            text-shadow: 0 4px 10px rgba(0, 200, 255, 0.4);
        }
        .sub {
            text-align: center;
            color: #8ab3cf;
            font-size: 0.75rem;
            margin-bottom: 16px;
        }
        .size-panel {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .size-btn {
            background: #1e3a4a;
            color: #8ab3cf;
            border: 1px solid #2f5568;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .size-btn.active {
            background: #31738f;
            color: white;
            border-color: #6ee7f7;
            box-shadow: 0 2px 0 #124052;
            transform: translateY(-1px);
        }
        .score-panel {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }
        .score-card {
            background: #1e3a4a;
            border-radius: 30px;
            padding: 8px 12px;
            text-align: center;
            flex: 1;
            box-shadow: 0 4px 0 #0b1a22;
            border: 1px solid #2f5568;
        }
        .score-label {
            font-size: 0.7rem;
            color: #8ab3cf;
        }
        .score-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #6ee7f7;
        }
        .best-value {
            color: #ffb87c;
        }
        .board {
            background: #1a2f3f;
            border-radius: 28px;
            padding: 10px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px #0a1a24, 0 10px 20px rgba(0,0,0,0.3);
        }
        .grid {
            display: grid;
            gap: 8px;
            aspect-ratio: 1 / 1;
        }
        .tile {
            background: #1f3e4b;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            transition: all 0.08s linear;
            box-shadow: 0 4px 0 #0b1a22;
            font-size: 1.2rem;
        }
        .tile[data-value="2"] { background: #2c5a6b; }
        .tile[data-value="4"] { background: #3a6e82; }
        .tile[data-value="8"] { background: #4c8c9e; }
        .tile[data-value="16"] { background: #5fa6bb; }
        .tile[data-value="32"] { background: #77c0d4; }
        .tile[data-value="64"] { background: #94d4e6; color: #1a2f3f; }
        .tile[data-value="128"] { background: #f5b042; color: #1a2f3f; }
        .tile[data-value="256"] { background: #f5a623; color: #1a2f3f; }
        .tile[data-value="512"] { background: #f57c00; color: white; }
        .tile[data-value="1024"] { background: #e56700; color: white; }
        .tile[data-value="2048"] { background: #d9530f; color: white; text-shadow: 0 0 5px gold; }
        .reset-btn {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: none;
            background: #31738f;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 6px 0 #124052;
            cursor: pointer;
            transition: 0.07s linear;
        }
        .reset-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #124052;
        }
        .footer {
            text-align: center;
            color: #366277;
            font-size: 0.7rem;
            margin-top: 14px;
        }
        @media (max-width: 500px) {
            .tile { font-size: 0.9rem; }
            .score-value { font-size: 1.2rem; }
            .size-btn { font-size: 0.7rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>2048</h1>
    <div class="sub">⚡ меняй размер поля, бей рекорды</div>

    <div class="size-panel" id="sizePanel">
        <button class="size-btn" data-size="4">4×4</button>
        <button class="size-btn" data-size="5">5×5</button>
        <button class="size-btn" data-size="6">6×6</button>
        <button class="size-btn" data-size="7">7×7</button>
        <button class="size-btn" data-size="8">8×8</button>
    </div>

    <div class="score-panel">
        <div class="score-card">
            <div class="score-label">СЧЁТ</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-card">
            <div class="score-label">ЛУЧШИЙ</div>
            <div class="score-value best-value" id="best">0</div>
        </div>
    </div>

    <div class="board">
        <div class="grid" id="grid"></div>
    </div>

    <button class="reset-btn" id="reset">⟳ НОВАЯ ИГРА</button>
    <div class="footer">Memuar's Games © 2026</div>
</div>

<script>
    (function(){
        // ---------- ЗВУКИ ----------
        let audioCtx = null;
        
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playTone(frequency, duration, volume = 0.3) {
            if (!audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.frequency.value = frequency;
                gain.gain.value = volume;
                oscillator.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
                oscillator.stop(now + duration);
            } catch(e) { console.log('audio error'); }
        }
        
        function playMove() {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            playTone(440, 0.06, 0.12);
        }
        
        function playMerge() {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            playTone(660, 0.1, 0.2);
            setTimeout(() => playTone(880, 0.08, 0.15), 70);
        }
        
        function playWin() {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            playTone(523.25, 0.25, 0.3);
            setTimeout(() => playTone(659.25, 0.25, 0.3), 180);
            setTimeout(() => playTone(783.99, 0.4, 0.35), 360);
        }
        
        function playReset() {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            playTone(330, 0.1, 0.15);
        }
        
        // ---------- Игровые переменные ----------
        let currentSize = 4;
        let board = [];
        let score = 0;
        let best = {};
        
        const savedBest = localStorage.getItem('memuar2048_best_sizes');
        if (savedBest) {
            try { best = JSON.parse(savedBest); } catch(e) {}
        }
        
        const gridEl = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const sizeBtns = document.querySelectorAll('.size-btn');
        
        function updateUI(){
            scoreEl.innerText = score;
            const currentBest = best[currentSize] || 0;
            bestEl.innerText = currentBest;
        }
        
        function saveBestForCurrentSize(){
            const currentBest = best[currentSize] || 0;
            if(score > currentBest){
                best[currentSize] = score;
                localStorage.setItem('memuar2048_best_sizes', JSON.stringify(best));
                updateUI();
            }
        }
        
        function createEmptyBoard(size){
            return Array(size).fill().map(() => Array(size).fill(0));
        }
        
        function render(){
            const cells = gridEl.children;
            const size = currentSize;
            for(let i = 0; i < size * size; i++){
                const row = Math.floor(i / size);
                const col = i % size;
                const val = board[row][col];
                const cell = cells[i];
                if(val === 0){
                    cell.innerText = '';
                    cell.setAttribute('data-value', '0');
                } else {
                    cell.innerText = val;
                    cell.setAttribute('data-value', val);
                }
            }
            updateUI();
        }
        
        function addRandomTile(){
            const empty = [];
            for(let i = 0; i < currentSize; i++){
                for(let j = 0; j < currentSize; j++){
                    if(board[i][j] === 0) empty.push([i,j]);
                }
            }
            if(empty.length === 0) return false;
            const [row, col] = empty[Math.floor(Math.random() * empty.length)];
            board[row][col] = Math.random() < 0.9 ? 2 : 4;
            return true;
        }
        
        function initGame(){
            board = createEmptyBoard(currentSize);
            score = 0;
            addRandomTile();
            addRandomTile();
            render();
        }
        
        function operateLine(line){
            let filtered = line.filter(v => v !== 0);
            let newLine = [];
            let skip = false;
            let merged = false;
            for(let i = 0; i < filtered.length; i++){
                if(skip){
                    skip = false;
                    continue;
                }
                if(i + 1 < filtered.length && filtered[i] === filtered[i+1]){
                    let val = filtered[i] * 2;
                    newLine.push(val);
                    score += val;
                    merged = true;
                    skip = true;
                } else {
                    newLine.push(filtered[i]);
                }
            }
            while(newLine.length < currentSize) newLine.push(0);
            return { newLine, merged };
        }
        
        function move(direction){
            let oldBoard = board.map(row => [...row]);
            let newBoard = createEmptyBoard(currentSize);
            let anyMerged = false;
            
            if(direction === 'left'){
                for(let i = 0; i < currentSize; i++){
                    let line = board[i];
                    let { newLine, merged } = operateLine(line);
                    newBoard[i] = newLine;
                    if(merged) anyMerged = true;
                }
            }
            else if(direction === 'right'){
                for(let i = 0; i < currentSize; i++){
                    let line = [...board[i]].reverse();
                    let { newLine, merged } = operateLine(line);
                    newBoard[i] = newLine.reverse();
                    if(merged) anyMerged = true;
                }
            }
            else if(direction === 'up'){
                for(let j = 0; j < currentSize; j++){
                    let line = [];
                    for(let i = 0; i < currentSize; i++) line.push(board[i][j]);
                    let { newLine, merged } = operateLine(line);
                    for(let i = 0; i < currentSize; i++) newBoard[i][j] = newLine[i];
                    if(merged) anyMerged = true;
                }
            }
            else if(direction === 'down'){
                for(let j = 0; j < currentSize; j++){
                    let line = [];
                    for(let i = currentSize - 1; i >= 0; i--) line.push(board[i][j]);
                    let { newLine, merged } = operateLine(line);
                    for(let i = 0; i < currentSize; i++) newBoard[currentSize - 1 - i][j] = newLine[i];
                    if(merged) anyMerged = true;
                }
            }
            
            let changed = false;
            for(let i = 0; i < currentSize; i++){
                for(let j = 0; j < currentSize; j++){
                    if(oldBoard[i][j] !== newBoard[i][j]) changed = true;
                }
            }
            if(!changed) return false;
            
            board = newBoard;
            addRandomTile();
            render();
            saveBestForCurrentSize();
            
            if(anyMerged) playMerge();
            else playMove();
            
            let maxVal = 0;
            for(let i = 0; i < currentSize; i++){
                for(let j = 0; j < currentSize; j++){
                    if(board[i][j] > maxVal) maxVal = board[i][j];
                }
            }
            if(maxVal >= 2048){
                setTimeout(() => {
                    playWin();
                    alert(`🎉 ${maxVal}! Ты победил! 🎉`);
                }, 50);
            }
            return true;
        }
        
        function resetGame(){
            initGame();
            saveBestForCurrentSize();
            playReset();
        }
        
        function rebuildGrid(){
            const size = currentSize;
            gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridEl.style.gap = size <= 5 ? '10px' : '6px';
            gridEl.innerHTML = '';
            for(let i = 0; i < size * size; i++){
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.setAttribute('data-value', '0');
                gridEl.appendChild(tile);
            }
        }
        
        function setSize(size){
            currentSize = size;
            rebuildGrid();
            initGame();
            saveBestForCurrentSize();
            
            sizeBtns.forEach(btn => {
                if(parseInt(btn.dataset.size) === size){
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        function handleKey(e){
            const key = e.key;
            if(key === 'ArrowLeft') move('left');
            else if(key === 'ArrowRight') move('right');
            else if(key === 'ArrowUp') move('up');
            else if(key === 'ArrowDown') move('down');
        }
        
        let touchStart = null;
        function handleTouchStart(e){
            const touch = e.touches[0];
            touchStart = { x: touch.clientX, y: touch.clientY };
        }
        function handleTouchEnd(e){
            if(!touchStart) return;
            const dx = e.changedTouches[0].clientX - touchStart.x;
            const dy = e.changedTouches[0].clientY - touchStart.y;
            if(Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
            if(Math.abs(dx) > Math.abs(dy)){
                if(dx > 0) move('right');
                else move('left');
            } else {
                if(dy > 0) move('down');
                else move('up');
            }
            touchStart = null;
        }
        
        function init(){
            rebuildGrid();
            setSize(4);
            
            window.addEventListener('keydown', handleKey);
            gridEl.addEventListener('touchstart', handleTouchStart);
            gridEl.addEventListener('touchend', handleTouchEnd);
            document.getElementById('reset').addEventListener('click', resetGame);
            
            sizeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    setSize(parseInt(btn.dataset.size));
                });
            });
            
            function activateAudio() {
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }
            document.body.addEventListener('touchstart', activateAudio);
            document.body.addEventListener('click', activateAudio);
        }
        
        init();
    })();
</script>
</body>
</html>
